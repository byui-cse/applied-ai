<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-labelledby="t">
  <title id="t">A few open books on a desk  most of the shelf stays closed</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#ebe6dc"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b1414"/>
      <stop offset="100%" stop-color="#8a2323"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- shelf / closed volumes (faint) -->
  <g opacity="0.35" fill="none" stroke="#6b645b" stroke-width="2">
    <rect x="40" y="48" width="560" height="12" rx="2"/>
    <rect x="48" y="68" width="36" height="100" rx="2"/>
    <rect x="92" y="68" width="32" height="100" rx="2"/>
    <rect x="132" y="68" width="40" height="100" rx="2"/>
    <rect x="180" y="68" width="28" height="100" rx="2"/>
    <rect x="216" y="68" width="200" height="100" rx="2"/>
    <rect x="424" y="68" width="36" height="100" rx="2"/>
    <rect x="468" y="68" width="44" height="100" rx="2"/>
  </g>
  <!-- desk -->
  <rect x="32" y="260" width="576" height="14" rx="3" fill="#3d3832" opacity="0.85"/>
  <!-- open book on desk -->
  <g transform="translate(220 200)">
    <path d="M0 52 L0 8 Q0 0 10 0 L90 0 Q100 0 100 10 L100 52 Z" fill="#faf6ef" stroke="#6b645b" stroke-width="1.5"/>
    <path d="M100 52 L100 8 Q100 0 110 0 L200 0 Q210 0 210 10 L210 52 Z" fill="#f2ede4" stroke="#6b645b" stroke-width="1.5"/>
    <line x1="100" y1="0" x2="100" y2="52" stroke="#6b645b" stroke-width="1"/>
    <line x1="24" y1="18" x2="76" y2="18" stroke="#6b645b" stroke-width="0.8" opacity="0.5"/>
    <line x1="124" y1="18" x2="186" y2="18" stroke="#6b645b" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- two closed books beside -->
  <rect x="120" y="188" width="56" height="72" rx="3" fill="url(#spine)"/>
  <rect x="128" y="196" width="40" height="4" fill="#faf6ef" opacity="0.35"/>
  <rect x="464" y="184" width="52" height="76" rx="3" fill="#3d3832" opacity="0.9"/>
  <rect x="472" y="192" width="36" height="4" fill="#faf6ef" opacity="0.25"/>
  <text x="320" y="328" text-anchor="middle" font-family="Libre Franklin, system-ui, sans-serif" font-size="13" fill="#6b645b">Only whats on the desk is in context</text>
</svg>
