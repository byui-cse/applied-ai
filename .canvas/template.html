<!--
  Canvas LMS content shell — newspaper / broadsheet (matches styles/styles.css intent).

  Rules: inline styles only; no <script>; no <style> blocks; no external CSS files.
  Replace {{CONTENT}} with HTML produced from markdown (prose only — headings, lists,
  blockquotes, code, tables). Optional: replace {{MASTHEAD_LABEL}}.

  Regenerate from a source .md file:
  python3 .canvas/build_canvas_content.py <path.md> --stdout [--masthead "Applied AI · …"] [--strip-reader]

  Fonts: Georgia / Times / system-ui / monospace stacks (no @import) for LMS compatibility.
-->
<div style="margin:0;padding:0;font-family:Georgia,'Times New Roman',Times,serif;font-size:17px;line-height:1.68;color:#0f0e0d;background-color:#ebe6dc;background-image:repeating-linear-gradient(90deg,transparent,transparent 1px,rgba(15,14,13,0.03) 1px,rgba(15,14,13,0.03) 2px),linear-gradient(180deg,rgba(255,252,247,0.35) 0%,transparent 28rem);padding:clamp(12px,3vw,22px);">
  <div style="max-width:52rem;margin:0 auto;">
    <!-- Masthead (matches .site-nav strip) -->
    <div style="border-top:5px solid #0f0e0d;border-bottom:3px double rgba(15,14,13,0.22);background-color:#f2ede4;box-shadow:inset 0 1px 0 rgba(255,255,255,0.45);padding:14px 20px;margin-bottom:clamp(12px,2vw,20px);">
      <span style="font-family:system-ui,-apple-system,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#3d3832;">{{MASTHEAD_LABEL}}</span>
    </div>
    <!-- Hero card (matches .card--hero) -->
    <div style="position:relative;background-color:#faf6ef;background-image:linear-gradient(180deg,hsla(40,20%,100%,0.35) 0%,transparent 45%),url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27120%27 height=%27120%27%3E%3Cfilter id=%27a%27%3E%3CfeTurbulence type=%27fractalNoise%27 baseFrequency=%270.9%27 numOctaves=%273%27 stitchTiles=%27stitch%27/%3E%3C/filter%3E%3Crect width=%27100%25%27 height=%27100%25%27 filter=%27url(%23a)%27/%3E%3C/svg%3E');background-size:auto,160px 160px;background-blend-mode:normal,soft-light;border:1px solid rgba(15,14,13,0.12);border-radius:3px;box-shadow:0 1px 0 rgba(255,255,255,0.55) inset,0 10px 28px rgba(15,12,8,0.05);padding:clamp(20px,3vw,40px);">
      <!-- Prose region: paste converted markdown HTML here -->
      <div style="width:100%;max-width:none;font-size:clamp(17px,0.2vw + 16px,19px);line-height:1.68;color:#0f0e0d;text-rendering:optimizeLegibility;">
        {{CONTENT}}
      </div>
    </div>
  </div>
</div>
