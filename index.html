<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Applied AI — Software Engineering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles/styles.css" />
  <script>
    (function () {
      try {
        if (localStorage.getItem("applied-ai-theme") === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <header class="site-nav" role="banner">
    <div class="site-nav__inner">
      <a class="site-nav__brand" href="?page=content/syllabus.md">Applied AI — Software Engineering</a>
      <div class="site-nav__search" id="site-search">
        <label class="site-nav__search-label" for="site-search-input">Search pages</label>
        <input type="search" id="site-search-input" class="site-nav__search-input" placeholder="Search pages & labs…"
          title="Search course pages (⌘K or Ctrl+K)" autocomplete="off" spellcheck="false" role="combobox"
          aria-autocomplete="list" aria-controls="site-search-listbox" aria-expanded="false" aria-haspopup="listbox" />
        <div class="site-nav__search-panel" id="site-search-panel" hidden>
          <ul class="site-nav__search-results" id="site-search-listbox" role="listbox" aria-label="Search results"></ul>
        </div>
      </div>
      <div class="site-nav__actions">
        <nav class="site-nav__links" aria-label="Primary">
          <a href="?page=content/syllabus.md">Syllabus</a>
          <a href="?page=content/phase-1/brownfield-project.md">Brownfield</a>
        </nav>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode" title="Theme">
          <svg class="theme-toggle__icon theme-toggle__icon--moon" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main" id="main">
    <div class="bento-grid">
      <article class="card card--hero" aria-labelledby="doc-title">
        <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
        <h1 class="display-title" id="doc-title">Course content</h1>
        <div class="prose" id="article"></div>
      </article>
      <aside class="card card--secondary" aria-label="On this page">
        <h2 class="card__heading">On this page</h2>
        <nav class="toc" id="toc" aria-label="Table of contents"></nav>
        <div class="card__divider"></div>
        <h2 class="card__heading">Browse</h2>
        <div class="browse" id="browse"></div>
      </aside>
    </div>
  </main>

  <div class="status-bar" id="status" role="status" aria-live="polite"></div>

  <button type="button" class="fab" id="fab" aria-expanded="false" aria-controls="fab-panel"
    aria-label="Open navigation menu">
    <span class="fab__icon" aria-hidden="true"></span>
  </button>
  <div class="fab-panel" id="fab-panel" hidden>
    <div class="fab-panel__sheet">
      <div class="fab-panel__header">
        <span>Navigate</span>
        <button type="button" class="fab-panel__close" id="fab-close" aria-label="Close menu">×</button>
      </div>
      <div class="fab-panel__body" id="fab-nav"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js" defer></script>
</body>

</html>
